name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      # TODO: Maybe move to prek once the official hook is released: https://github.com/astral-sh/ty/issues/269
      - name: Run typechecker
        run: uv run ty check

      - name: Run tests
        run: uv run pytest -v
